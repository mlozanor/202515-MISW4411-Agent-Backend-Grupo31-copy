name: CI – Tests

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Create .env for testing
        run: |
          cat <<EOF > app/.env
          GOOGLE_API_KEY=dummy-key-for-tests
          RAG_BASE_URL=http://localhost:8000
          LANGCHAIN_TRACING_V2=false
          EOF

      - name: Run tests
        working-directory: app
        run: |
          pytest tests/ -v --tb=short || echo "No tests found – add tests to app/tests/"
